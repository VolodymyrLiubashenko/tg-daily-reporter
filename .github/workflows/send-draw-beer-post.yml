name: Send draw beer post

on:
   schedule:
      # Среда и суббота, 10:05 UTC (~13:05 MSK).
      - cron: "5 9 * * 3"
      - cron: "5 9 * * 5"
      - cron: "5 9 * * 6"
   workflow_dispatch:

jobs:
   send-draw-beer-post:
      runs-on: ubuntu-latest

      steps:
         - name: Call draw beer post endpoint
           run: |
              curl --fail --silent --show-error \
                -X POST \
                -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
                "${{ secrets.DRAW_BEER_POST_URL }}"
