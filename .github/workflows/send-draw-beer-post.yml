name: Send draw beer post

# Расписание: cron-job.org (см. docs/external-cron.md).
on:
   workflow_dispatch:

jobs:
   send-draw-beer-post:
      runs-on: ubuntu-latest

      steps:
         - name: Call draw beer post endpoint
           run: |
              curl --fail --silent --show-error \
                -X POST \
                -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
                "${{ secrets.DRAW_BEER_POST_URL }}"
