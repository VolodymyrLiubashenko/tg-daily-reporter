name: Send raffle result

# Расписание: cron-job.org (см. docs/external-cron.md).
on:
   workflow_dispatch:

jobs:
   send-raffle-result:
      runs-on: ubuntu-latest

      steps:
         - name: Call raffle result endpoint
           run: |
              curl --fail --silent --show-error \
                -X POST \
                -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
                "${{ secrets.RAFFLE_RESULT_URL }}"
