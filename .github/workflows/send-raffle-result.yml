name: Send raffle result

on:
   schedule:
      # Пятница, 16:05 UTC (~19:05 MSK).
      - cron: "5 15 * * 5"
   workflow_dispatch:

jobs:
   send-raffle-result:
      runs-on: ubuntu-latest

      steps:
         - name: Call raffle result endpoint
           run: |
              curl --fail --silent --show-error \
                -X POST \
                -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
                "${{ secrets.RAFFLE_RESULT_URL }}"
