name: Send morning report

on:
   schedule:
      - cron: "5 9 * * *"
   workflow_dispatch:

jobs:
   send-report:
      runs-on: ubuntu-latest

      steps:
         - name: Call report endpoint
           run: |
              curl --fail --silent --show-error \
                -X POST \
                -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
                "${{ secrets.REPORT_URL }}"
