name: Send morning report

# Расписание: cron-job.org (см. docs/external-cron.md). GitHub schedule убран из-за очереди на free runners.
on:
   workflow_dispatch:

jobs:
   send-report:
      runs-on: ubuntu-latest

      steps:
         - name: Call report endpoint
           run: |
              curl --fail --silent --show-error \
                -X POST \
                -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
                "${{ secrets.REPORT_URL }}"
